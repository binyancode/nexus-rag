</defs><rect x="0" y="0" width="1280" height="720" fill="url(#bgg)"/><text x="70" y="158" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="15.5" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">集合运算（Intersect / Diff / Union / Dedup）：对实体 id 集合做哈希集合运算，纯内存、确定性、不读存储。</text><circle cx="300" cy="350" r="120" fill="#1470C4" fill-opacity="0.2" stroke="#1470C4" stroke-width="2.2"/><circle cx="430" cy="350" r="120" fill="#0E9C9C" fill-opacity="0.2" stroke="#0E9C9C" stroke-width="2.2"/><text x="240" y="250" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="20" fill="#1470C4" font-weight="800" text-anchor="middle" opacity="1.0">A</text><text x="490" y="250" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="20" fill="#0E9C9C" font-weight="800" text-anchor="middle" opacity="1.0">B</text><text x="255" y="356" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#1470C4" font-weight="800" text-anchor="middle" opacity="1.0">A−B</text><text x="365" y="356" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#2A3A4A" font-weight="800" text-anchor="middle" opacity="1.0">A∩B</text><text x="475" y="356" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#0E9C9C" font-weight="800" text-anchor="middle" opacity="1.0">B−A</text><g filter="url(#sh)"><rect x="620" y="200" width="590" height="62" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="620" y="200" width="6" height="62" rx="3" fill="#E0812E" opacity="1.0"/><text x="644" y="226" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Intersect  A∩B</text><text x="644" y="248" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">两边都有 → 交集（对比“共同”）</text><g filter="url(#sh)"><rect x="620" y="274" width="590" height="62" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="620" y="274" width="6" height="62" rx="3" fill="#1470C4" opacity="1.0"/><text x="644" y="300" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Diff  A−B</text><text x="644" y="322" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">A 有 B 没有 → 差集（对比“独有”）</text><g filter="url(#sh)"><rect x="620" y="348" width="590" height="62" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="620" y="348" width="6" height="62" rx="3" fill="#0E9C9C" opacity="1.0"/><text x="644" y="374" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Union  A∪B</text><text x="644" y="396" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">任一有 → 并集（合并）</text><g filter="url(#sh)"><rect x="620" y="422" width="590" height="62" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="620" y="422" width="6" height="62" rx="3" fill="#2E9E6B" opacity="1.0"/><text x="644" y="448" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Dedup</text><text x="644" y="470" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">按 key（fullname/实体id）去重，保留一个</text><rect x="70" y="506" width="1140" height="112" rx="12" fill="#0E2E52" opacity="1.0"/><rect x="70" y="506" width="6" height="112" rx="3" fill="#E0812E" opacity="1.0"/><text x="92" y="534" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#8FD3FF" font-weight="800" text-anchor="start" opacity="1.0">具体例子</text><text x="96" y="560" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#DCEBFA" font-weight="600" text-anchor="start" opacity="1.0">实现：用哈希集合（set），Intersect/Diff/Union 均 ≈ O(|A|+|B|)；纯内存不碰存储。</text><text x="96" y="582" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#DCEBFA" font-weight="600" text-anchor="start" opacity="1.0">例①用 Diff（IND−NDA=8）；例②用 Intersect（细胞治疗∩IND=7）。</text></svg></body></html>

</defs><rect x="0" y="0" width="1280" height="720" fill="url(#bgg)"/><text x="70" y="158" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="15.5" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">块可分散在多个 AI Search（密钥放凭据）；Collection = store 集合、纯查询期过滤器，一次只选一个、不跨。</text><g filter="url(#sh)"><rect x="70" y="176" width="210" height="66" rx="12" fill="#DBEAFA" opacity="1.0" stroke="#1470C4" stroke-width="1.5"/></g><rect x="70" y="176" width="6" height="66" rx="3" fill="#1470C4" opacity="1.0"/><rect x="88" y="197" width="20" height="18" rx="0" fill="#1470C4" opacity="1.0"/><ellipse cx="98" cy="215" rx="10" ry="3.8" fill="#1470C4"/><ellipse cx="98" cy="197" rx="10" ry="3.8" fill="#FFFFFF" opacity="0.6"/><text x="124" y="204" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Store S1 · AI Search</text><text x="124" y="226" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">凭据 azure_ai_search</text><g filter="url(#sh)"><rect x="70" y="262" width="210" height="66" rx="12" fill="#D3EFEE" opacity="1.0" stroke="#0E9C9C" stroke-width="1.5"/></g><rect x="70" y="262" width="6" height="66" rx="3" fill="#0E9C9C" opacity="1.0"/><rect x="88" y="283" width="20" height="18" rx="0" fill="#0E9C9C" opacity="1.0"/><ellipse cx="98" cy="301" rx="10" ry="3.8" fill="#0E9C9C"/><ellipse cx="98" cy="283" rx="10" ry="3.8" fill="#FFFFFF" opacity="0.6"/><text x="124" y="290" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Store S2 · AI Search</text><text x="124" y="312" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">凭据 azure_ai_search</text><g filter="url(#sh)"><rect x="70" y="348" width="210" height="66" rx="12" fill="#D7F0E3" opacity="1.0" stroke="#2E9E6B" stroke-width="1.5"/></g><rect x="70" y="348" width="6" height="66" rx="3" fill="#2E9E6B" opacity="1.0"/><rect x="88" y="369" width="20" height="18" rx="0" fill="#2E9E6B" opacity="1.0"/><ellipse cx="98" cy="387" rx="10" ry="3.8" fill="#2E9E6B"/><ellipse cx="98" cy="369" rx="10" ry="3.8" fill="#FFFFFF" opacity="0.6"/><text x="124" y="376" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Store S3 · AI Search</text><text x="124" y="398" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">凭据 azure_ai_search</text><line x1="280" y1="209" x2="360" y2="236" stroke="#7A5CC0" stroke-width="2" opacity="1.0" stroke-linecap="round"/><line x1="280" y1="295" x2="360" y2="236" stroke="#7A5CC0" stroke-width="2" opacity="1.0" stroke-linecap="round"/><line x1="280" y1="295" x2="360" y2="382" stroke="#E0812E" stroke-width="2" opacity="1.0" stroke-linecap="round"/><line x1="280" y1="381" x2="360" y2="382" stroke="#E0812E" stroke-width="2" opacity="1.0" stroke-linecap="round"/><rect x="360" y="214" width="158" height="44" rx="10" fill="#E7E0F6" opacity="1.0" stroke="#7A5CC0" stroke-width="1.6"/><rect x="360" y="214" width="5" height="44" rx="3" fill="#7A5CC0" opacity="1.0"/><text x="382" y="242" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Collection α</text><rect x="360" y="360" width="158" height="44" rx="10" fill="#FBE9D6" opacity="1.0" stroke="#E0812E" stroke-width="1.6"/><rect x="360" y="360" width="5" height="44" rx="3" fill="#E0812E" opacity="1.0"/><text x="382" y="388" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Collection β</text><text x="70" y="442" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11.5" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">S2 同属 α 和 β —— store ↔ collection 多对多，不物化实体↔collection。</text><g filter="url(#sh)"><rect x="560" y="176" width="650" height="260" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="560" y="176" width="6" height="260" rx="3" fill="#7A5CC0" opacity="1.0"/><text x="584" y="210" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="15" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">本次查询：选 Collection α（不跨）</text><rect x="584" y="224" width="300" height="30" rx="15.0" fill="#E7E0F6" opacity="1.0"/><text x="734.0" y="243.375" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#7A5CC0" font-weight="800" text-anchor="middle" opacity="1.0">allowed_stores = { S1, S2 }</text><rect x="584" y="276" width="602" height="36" rx="8" fill="#F7F8FC" opacity="1.0" stroke="#D8E1EC" stroke-width="1"/><rect x="584" y="276" width="4" height="36" rx="2" fill="#1470C4" opacity="1.0"/><text x="600" y="299" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Search</text><text x="770" y="299" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11.5" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">只打 S1 / S2 的 block store</text><rect x="584" y="320" width="602" height="36" rx="8" fill="#F7F8FC" opacity="1.0" stroke="#D8E1EC" stroke-width="1"/><rect x="584" y="320" width="4" height="36" rx="2" fill="#0E9C9C" opacity="1.0"/><text x="600" y="343" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Traverse / 可见性</text><text x="770" y="343" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11.5" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">evidence.store_id ∈ {S1,S2} 才可走</text><rect x="584" y="364" width="602" height="36" rx="8" fill="#F7F8FC" opacity="1.0" stroke="#D8E1EC" stroke-width="1"/><rect x="584" y="364" width="4" height="36" rx="2" fill="#2E9E6B" opacity="1.0"/><text x="600" y="387" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">Ground</text><text x="770" y="387" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11.5" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">只取 store_id ∈ {S1,S2} 的块取原文</text><text x="584" y="420" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#D2503F" font-weight="700" text-anchor="start" opacity="1.0">指向 S3 的实体 / 证据 → 本次不查（S3 不在 α 里）。</text><g filter="url(#sh)"><rect x="70" y="468" width="570" height="182" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="70" y="468" width="6" height="182" rx="3" fill="#0E9C9C" opacity="1.0"/><text x="94" y="500" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="14" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">重排取舍（看 collection 里放几个 store）</text><text x="94" y="532" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">· 单 store 的 collection → 只打一个 AI Search，</text><text x="108" y="554" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">用内置 Semantic Ranker 即可，无跨源重排</text><text x="94" y="584" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">· 多 store 的 collection → 扇出多 store + 外部 reranker</text><text x="108" y="606" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">（用户自选分散存储，就自担这个代价）</text><g filter="url(#sh)"><rect x="665" y="468" width="545" height="182" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="665" y="468" width="6" height="182" rx="3" fill="#E0812E" opacity="1.0"/><text x="689" y="500" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="14" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">身份 vs 位置（把会变的留在查询期）</text><text x="689" y="532" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">· fullname / block id 纯逻辑、稳定 → 不带 store</text><text x="689" y="560" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">· 物理归属 = evidence 边上的 store_id 字段</text><text x="689" y="588" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">· collection 不入任何存下来的 id/字段，只当查询参数</text><text x="689" y="616" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">· 加/移 store 只改注册表一行，实体/块/边零重算</text></svg></body></html>

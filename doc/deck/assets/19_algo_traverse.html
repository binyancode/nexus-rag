</defs><rect x="0" y="0" width="1280" height="720" fill="url(#bgg)"/><text x="70" y="158" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="15.5" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">Traverse（带权扩散 Spreading Activation）：从起点沿类型化边扩散，带权重衰减、阈值与防环。图导航的核心。</text><g filter="url(#sh)"><rect x="70" y="186" width="250" height="300" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="70" y="186" width="6" height="300" rx="3" fill="#0E9C9C" opacity="1.0"/><rect x="88" y="202" width="76" height="26" rx="13.0" fill="#0E9C9C" opacity="1.0"/><text x="126.0" y="219.55" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">输入</text><text x="90" y="248" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">起点节点集 S0</text><text x="90" y="272" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">edge_type（如 requires）</text><text x="90" y="296" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">方向 dir（out / in）</text><text x="90" y="320" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">max_hops、阈值 τ、衰减 γ</text><line x1="322" y1="336" x2="352" y2="336" stroke="#5A6B7B" stroke-width="2.6" marker-end="url(#arrow)" stroke-linecap="round"/><g filter="url(#sh)"><rect x="354" y="186" width="510" height="300" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="354" y="186" width="6" height="300" rx="3" fill="#0E9C9C" opacity="1.0"/><rect x="374" y="202" width="96" height="26" rx="13.0" fill="#0E9C9C" opacity="1.0"/><text x="422.0" y="219.375" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">算法过程</text><rect x="392" y="300" width="96" height="40" rx="10" fill="#DBEAFA" opacity="1.0" stroke="#1470C4" stroke-width="1.6"/><text x="440.0" y="324.68" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#1470C4" font-weight="700" text-anchor="middle" opacity="1.0">IND</text><text x="440" y="356" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#1470C4" font-weight="800" text-anchor="middle" opacity="1.0">act=1.0</text><line x1="490" y1="308" x2="560" y2="278" stroke="#0E9C9C" stroke-width="2" marker-end="url(#arrow)" stroke-linecap="round"/><line x1="490" y1="332" x2="560" y2="362" stroke="#0E9C9C" stroke-width="2" marker-end="url(#arrow)" stroke-linecap="round"/><text x="528" y="288" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="9.5" fill="#5A6B7B" font-weight="700" text-anchor="start" opacity="1.0">×w·γ</text><rect x="562" y="258" width="110" height="38" rx="10" fill="#D3EFEE" opacity="1.0" stroke="#0E9C9C" stroke-width="1.6"/><text x="617.0" y="281.32" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#0E9C9C" font-weight="700" text-anchor="middle" opacity="1.0">GCP</text><text x="617" y="310" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#0E9C9C" font-weight="800" text-anchor="middle" opacity="1.0">act=.54</text><rect x="562" y="344" width="110" height="38" rx="10" fill="#D3EFEE" opacity="1.0" stroke="#0E9C9C" stroke-width="1.6"/><text x="617.0" y="366.96" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#0E9C9C" font-weight="700" text-anchor="middle" opacity="1.0">药品管理法</text><text x="617" y="396" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#0E9C9C" font-weight="800" text-anchor="middle" opacity="1.0">act=.54</text><line x1="674" y1="274" x2="736" y2="262" stroke="#C6D2E0" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="738" y="244" width="96" height="34" rx="10" fill="#F0F4F9" opacity="1.0" stroke="#9FB0C2" stroke-width="1.6"/><text x="786.0" y="264.96" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#9FB0C2" font-weight="700" text-anchor="middle" opacity="1.0">下一跳</text><text x="786" y="300" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#D2503F" font-weight="800" text-anchor="middle" opacity="1.0">act=.29 &lt; τ</text><text x="738" y="330" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#D2503F" font-weight="700" text-anchor="start" opacity="1.0">剪枝停止</text><text x="374" y="458" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">① act(seed)=1 ② 沿边 BFS：act(n)=act(cur)×w×γ ③ act&lt;τ 或超跳数则停，visited 防环</text><line x1="866" y1="336" x2="896" y2="336" stroke="#5A6B7B" stroke-width="2.6" marker-end="url(#arrow)" stroke-linecap="round"/><g filter="url(#sh)"><rect x="898" y="186" width="312" height="300" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="898" y="186" width="6" height="300" rx="3" fill="#2E9E6B" opacity="1.0"/><rect x="916" y="202" width="76" height="26" rx="13.0" fill="#2E9E6B" opacity="1.0"/><text x="954.0" y="219.55" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">输出</text><text x="918" y="248" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">到达节点集 + 激活分</text><text x="918" y="272" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">按 act 排序 / 取阈值以上</text><text x="918" y="296" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">= 该起点“关系可达”的对象</text><rect x="70" y="506" width="1140" height="112" rx="12" fill="#0E2E52" opacity="1.0"/><rect x="70" y="506" width="6" height="112" rx="3" fill="#E0812E" opacity="1.0"/><text x="92" y="534" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#8FD3FF" font-weight="800" text-anchor="start" opacity="1.0">具体例子</text><text x="96" y="560" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#DCEBFA" font-weight="600" text-anchor="start" opacity="1.0">act(d) = max_path  sim(seed) × Π w(e) × γ^hops   （γ 衰减，τ 阈值，visited 防环）</text><text x="96" y="582" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#DCEBFA" font-weight="600" text-anchor="start" opacity="1.0">例：IND 沿 requires 正向 1 跳 → GCP：act = 1×0.9×0.6 = 0.54（&gt; τ 保留）。复杂度受跳数/阈值约束。</text></svg></body></html>

</defs><rect x="0" y="0" width="1280" height="720" fill="url(#bgg)"/><text x="70" y="158" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="15.5" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">AI Search 长什么样：法规原文切成小块，每块带 fullname 地址 + 向量 + 元数据；一个索引兼做检索 / 过滤 / 重排。</text><g filter="url(#sh)"><rect x="70" y="182" width="1140" height="286" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="70" y="182" width="6" height="286" rx="3" fill="#2E9E6B" opacity="1.0"/><text x="94" y="214" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="15" fill="#2E9E6B" font-weight="800" text-anchor="start" opacity="1.0">长这样 · 块 = 原文片段 + 向量 + fullname（左：块记录；右：向量空间）</text><rect x="94" y="242" width="540" height="104" rx="10" fill="#FBFCFE" opacity="1.0" stroke="#2E9E6B" stroke-width="1.3"/><rect x="94" y="242" width="5" height="104" rx="2" fill="#2E9E6B" opacity="1.0"/><text x="112" y="266" font-family="'Consolas','Courier New',monospace" font-size="11.5" fill="#123A63" font-weight="800" text-anchor="start" opacity="1.0">fullname: GCP.总则.b01</text><text x="112" y="286" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">“本规范适用于药物临床试验的全过程…”</text><text x="112" y="306" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#0E9C9C" font-weight="700" text-anchor="start" opacity="1.0">vector: [0.12, -0.03, 0.88, …]  3072 维</text><text x="112" y="326" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">type=Reg · status=现行 · reg_id=reg_gcp_001</text><rect x="94" y="356" width="540" height="100" rx="10" fill="#FBFCFE" opacity="1.0" stroke="#2E9E6B" stroke-width="1.3"/><rect x="94" y="356" width="5" height="100" rx="2" fill="#2E9E6B" opacity="1.0"/><text x="112" y="380" font-family="'Consolas','Courier New',monospace" font-size="11.5" fill="#123A63" font-weight="800" text-anchor="start" opacity="1.0">fullname: IND.药品注册管理办法.临床章.b07</text><text x="112" y="400" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">“临床试验应遵守《GCP》…”</text><text x="112" y="420" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#0E9C9C" font-weight="700" text-anchor="start" opacity="1.0">vector: [0.12, -0.03, 0.88, …]  3072 维</text><text x="112" y="440" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">type=Reg · status=现行 · reg_id=reg_ndaadmin</text><rect x="700" y="240" width="490" height="218" rx="12" fill="#F4F9F6" opacity="1.0" stroke="#D7F0E3" stroke-width="1.4"/><text x="718" y="266" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#2E9E6B" font-weight="800" text-anchor="start" opacity="1.0">向量空间：语义相近 → 相邻（ANN 找最近的块）</text><circle cx="1080" cy="300" r="9" fill="#C6D2E0" opacity="1.0"/><circle cx="1120" cy="390" r="9" fill="#C6D2E0" opacity="1.0"/><circle cx="1030" cy="410" r="9" fill="#C6D2E0" opacity="1.0"/><circle cx="1000" cy="295" r="9" fill="#C6D2E0" opacity="1.0"/><line x1="850" y1="370" x2="780" y2="330" stroke="#2E9E6B" stroke-width="1.5" stroke-dasharray="3 3" opacity="1.0" stroke-linecap="round"/><circle cx="780" cy="330" r="10" fill="#2E9E6B" opacity="1.0"/><line x1="850" y1="370" x2="820" y2="425" stroke="#2E9E6B" stroke-width="1.5" stroke-dasharray="3 3" opacity="1.0" stroke-linecap="round"/><circle cx="820" cy="425" r="10" fill="#2E9E6B" opacity="1.0"/><line x1="850" y1="370" x2="910" y2="350" stroke="#2E9E6B" stroke-width="1.5" stroke-dasharray="3 3" opacity="1.0" stroke-linecap="round"/><circle cx="910" cy="350" r="10" fill="#2E9E6B" opacity="1.0"/><circle cx="850" cy="370" r="15" fill="#D2503F" opacity="1.0"/><text x="850" y="375" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">q</text><text x="850" y="404" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#D2503F" font-weight="700" text-anchor="middle" opacity="1.0">查询向量</text><text x="1000" y="440" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#5A6B7B" font-weight="600" text-anchor="middle" opacity="1.0">绿点 = 命中 Top-k　灰点 = 其他块</text><g filter="url(#sh)"><rect x="70" y="486" width="567" height="180" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="70" y="486" width="6" height="180" rx="3" fill="#E0812E" opacity="1.0"/><circle cx="114" cy="516" r="18" fill="#FBE9D6" opacity="1.0"/><rect x="111" y="507.94" width="6" height="3.38" fill="#E0812E" transform="rotate(0 114 516)"/><rect x="111" y="507.94" width="6" height="3.38" fill="#E0812E" transform="rotate(60 114 516)"/><rect x="111" y="507.94" width="6" height="3.38" fill="#E0812E" transform="rotate(120 114 516)"/><rect x="111" y="507.94" width="6" height="3.38" fill="#E0812E" transform="rotate(180 114 516)"/><rect x="111" y="507.94" width="6" height="3.38" fill="#E0812E" transform="rotate(240 114 516)"/><rect x="111" y="507.94" width="6" height="3.38" fill="#E0812E" transform="rotate(300 114 516)"/><circle cx="114" cy="516" r="5.2" fill="#E0812E" opacity="1.0"/><circle cx="114" cy="516" r="2.08" fill="#fff" opacity="1.0"/><text x="144" y="522" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="16" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">为什么这么存</text><circle cx="102" cy="546" r="3" fill="#E0812E" opacity="1.0"/><text x="116" y="550" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">切成小块：可引用的最小单元，答案能精确定位到条 / 款。</text><circle cx="102" cy="572" r="3" fill="#E0812E" opacity="1.0"/><text x="116" y="576" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">fullname 地址：块知道自己在文档树的位置 → 可溯源、可排序。</text><circle cx="102" cy="598" r="3" fill="#E0812E" opacity="1.0"/><text x="116" y="602" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">向量：语义相近就相邻，能召回「意思对但用词不同」的内容。</text><circle cx="102" cy="624" r="3" fill="#E0812E" opacity="1.0"/><text x="116" y="628" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">元数据随块存：type / status / id → 过滤下推、回连实体。</text><g filter="url(#sh)"><rect x="643" y="486" width="567" height="180" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="643" y="486" width="6" height="180" rx="3" fill="#0E9C9C" opacity="1.0"/><circle cx="687" cy="516" r="18" fill="#D3EFEE" opacity="1.0"/><circle cx="685.05" cy="514.05" r="6.76" fill="none" opacity="1.0" stroke="#0E9C9C" stroke-width="3"/><line x1="689.86" y1="518.86" x2="695.06" y2="524.06" stroke="#0E9C9C" stroke-width="3.4" opacity="1.0" stroke-linecap="round"/><text x="717" y="522" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="16" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">怎么检索</text><circle cx="675" cy="546" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="550" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">embed(查询) → HNSW 近邻搜索找最相近的块（ANN）。</text><circle cx="675" cy="572" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="576" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">$filter 下推：先按 type / status 早筛，再算相似度。</text><circle cx="675" cy="598" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="602" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">语义重排（queryType=semantic）把最相关的顶上来，取 Top-k。</text><circle cx="675" cy="624" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="628" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">命中块 → 按 fullname 溯源，或 Lift 抬到实体层走关系。</text></svg></body></html>

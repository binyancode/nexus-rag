crosoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.6" fill="#17222E" font-weight="700" text-anchor="start" opacity="1.0">固定代码路径 → 填模板 → 调 LLM → 解析结构化输出</text><text x="392" y="286" font-family="'Consolas','Courier New',monospace" font-size="12.8" fill="#7A5CC0" font-weight="800" text-anchor="start" opacity="1.0">Summarize</text><text x="500" y="286" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.6" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">块 → 摘要文本</text><text x="392" y="322" font-family="'Consolas','Courier New',monospace" font-size="12.8" fill="#7A5CC0" font-weight="800" text-anchor="start" opacity="1.0">Extract</text><text x="500" y="322" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.6" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">块 + field → 抽取的值</text><text x="392" y="358" font-family="'Consolas','Courier New',monospace" font-size="12.8" fill="#7A5CC0" font-weight="800" text-anchor="start" opacity="1.0">Compare</text><text x="500" y="358" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.6" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">A,B,aspect → 结构化异同</text><text x="392" y="394" font-family="'Consolas','Courier New',monospace" font-size="12.8" fill="#7A5CC0" font-weight="800" text-anchor="start" opacity="1.0">Generate</text><text x="500" y="394" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.6" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">context+模板 → 答案+引用</text><text x="392" y="430" font-family="'Consolas','Courier New',monospace" font-size="12.8" fill="#7A5CC0" font-weight="800" text-anchor="start" opacity="1.0">Judge</text><text x="500" y="430" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.6" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">→ 打分

</defs><rect x="0" y="0" width="1280" height="720" fill="url(#bgg)"/><text x="70" y="158" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="15.5" fill="#5A6B7B" font-weight="500" text-anchor="start" opacity="1.0">校验控制：SetCheck 保“不漏”，ProvenanceCheck 保“不编”，Threshold 保“不错答”。不达标可回环重规划。</text><g filter="url(#sh)"><rect x="70" y="186" width="366" height="300" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="70" y="186" width="6" height="300" rx="3" fill="#2E9E6B" opacity="1.0"/><rect x="92" y="206" width="190" height="28" rx="14.0" fill="#2E9E6B" opacity="1.0"/><text x="187.0" y="224.55" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">SetCheck 完整性</text><circle cx="106" cy="258" r="12" fill="#2E9E6B" opacity="1.0"/><text x="106" y="263" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">1</text><text x="128" y="262" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">结果集合 vs “应有集合”（图上确定性算出）</text><circle cx="106" cy="291" r="12" fill="#2E9E6B" opacity="1.0"/><text x="106" y="296" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">2</text><text x="128" y="295" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">求差集 → 找出漏项</text><circle cx="106" cy="324" r="12" fill="#2E9E6B" opacity="1.0"/><text x="106" y="329" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">3</text><text x="128" y="328" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">缺 → 回填 / 重试</text><g filter="url(#sh)"><rect x="458" y="186" width="366" height="300" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="458" y="186" width="6" height="300" rx="3" fill="#E0812E" opacity="1.0"/><rect x="480" y="206" width="190" height="28" rx="14.0" fill="#E0812E" opacity="1.0"/><text x="575.0" y="224.55" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">ProvenanceCheck 溯源</text><circle cx="494" cy="258" r="12" fill="#E0812E" opacity="1.0"/><text x="494" y="263" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">1</text><text x="516" y="262" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">对每条结果的名字</text><circle cx="494" cy="291" r="12" fill="#E0812E" opacity="1.0"/><text x="494" y="296" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">2</text><text x="516" y="295" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">在原文块里做字符串匹配</text><circle cx="494" cy="324" r="12" fill="#E0812E" opacity="1.0"/><text x="494" y="329" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">3</text><text x="516" y="328" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">匹配不上 = 幻觉 → 剔除</text><g filter="url(#sh)"><rect x="846" y="186" width="366" height="300" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="846" y="186" width="6" height="300" rx="3" fill="#D2503F" opacity="1.0"/><rect x="868" y="206" width="190" height="28" rx="14.0" fill="#D2503F" opacity="1.0"/><text x="963.0" y="224.55" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">Threshold 兜底</text><circle cx="882" cy="258" r="12" fill="#D2503F" opacity="1.0"/><text x="882" y="263" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">1</text><text x="904" y="262" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">若最高检索分 &lt; 阈值 τ</text><circle cx="882" cy="291" r="12" fill="#D2503F" opacity="1.0"/><text x="882" y="296" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">2</text><text x="904" y="295" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">则 abstain（不硬答）</text><circle cx="882" cy="324" r="12" fill="#D2503F" opacity="1.0"/><text x="882" y="329" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">3</text><text x="904" y="328" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.2" fill="#17222E" font-weight="600" text-anchor="start" opacity="1.0">返回“最接近候选”</text><rect x="70" y="506" width="1140" height="112" rx="12" fill="#0E2E52" opacity="1.0"/><rect x="70" y="506" width="6" height="112" rx="3" fill="#E0812E" opacity="1.0"/><text x="92" y="534" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#8FD3FF" font-weight="800" text-anchor="start" opacity="1.0">具体例子</text><text x="96" y="560" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#DCEBFA" font-weight="600" text-anchor="start" opacity="1.0">三者串联：SetCheck（不漏）→ ProvenanceCheck（不编）→ Threshold（不错答）。</text><text x="96" y="582" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#DCEBFA" font-weight="600" text-anchor="start" opacity="1.0">SetCheck 的“应有集合”来自结构化通道（如 IND 的全部 requires）；不达标可触发 Replan 有界回环。</text></svg></body></html>

family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">步骤：对每个块沿 evidence 反向找实体 → 去重 → 得到实体集。</text><text x="90" y="366" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">用途：Search（向量）命中块后，抬到实体层才能走结构关系（requires…）。</text><text x="90" y="392" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.8" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">多个块可能佐证同一实体 → 需 Dedup。</text><g filter="url(#sh)"><rect x="655" y="186" width="555" height="300" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="655" y="186" width="6" height="300" rx="3" fill="#2E9E6B" opacity="1.0"/><rect x="675" y="204" width="96" height="26" rx="13.0" fill="#2E9E6B" opacity="1.0"/><text x="723.0" y="221.55" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1.0">Ground</text><text x="785" y="222" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#17222E" font-weight="700" text-anchor="start" opacity="1.0">实体 → 它的证据块（沿 evidence 正向）</text><rect x="680" y="260" width="150" height="40" rx="10" fill="#E3F4EA" opacity="1.0" stroke="#2E9E6B" stroke-width="1.6"/><text x="755.0" y="284.68" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#2E9E6B" font-weight="700" text-anchor="middle" opacity="1.0">Reg:GCP</text><line x1="832" y1="268" x2="930" y2="258" stroke="#2E9E6B" stroke-width="2" marker-end="url(#arrowg)" stroke-linecap="round"/><line x1="832" y1="288" x2="930" y2="300" stroke="#2E9E6B" stroke-width="2" marker-end="url(#arrowg)" stroke-linecap="round"/><rect x="932" y="240" width="150" height="36" rx="10" fill="#D7F0E3" opacity="1.0" stroke="#2E9E6B" stroke-width="1.6"/><text x="10

end="url(#arrowg)" stroke-linecap="round"/><rect x="417.29" y="255.0" width="35.42" height="20" rx="5" fill="#FFFFFF" opacity="1.0" stroke="#2E9E6B" stroke-width="1"/><text x="435.0" y="269.0" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#2E9E6B" font-weight="800" text-anchor="middle" opacity="1.0">归类</text><line x1="350.5" y1="289.0" x2="355.7083333333333" y2="339.0" stroke="#E0812E" stroke-width="1.9" marker-end="url(#arrowo)" stroke-linecap="round"/><rect x="335.39416666666665" y="304.0" width="35.42" height="20" rx="5" fill="#FFFFFF" opacity="1.0" stroke="#E0812E" stroke-width="1"/><text x="353.10416666666663" y="318.0" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#E0812E" font-weight="800" text-anchor="middle" opacity="1.0">替代</text><line x1="213.52727272727273" y1="351.0" x2="310.4727272727273" y2="289.0" stroke="#7A5CC0" stroke-width="1.9" marker-end="url(#arrowp)" stroke-linecap="round"/><rect x="244.29" y="310.0" width="35.42" height="20" rx="5" fill="#FFFFFF" opacity="1.0" stroke="#7A5CC0" stroke-width="1"/><text x="262.0" y="324.0" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#7A5CC0" font-weight="800" text-anchor="middle" opacity="1.0">引用</text><line x1="394.13793103448273" y1="289.0" x2="524.8620689655172" y2="357.0" stroke="#1470C4" stroke-width="1.9" marker-end="url(#arrow)" stroke-linecap="round"/><line x1="524.8620689655172" y1="357.0" x2="394.13793103448273" y2="289.0" stroke="#1470C4" stroke-width="1.9" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="441.79" y="313.0" width="35.42" height="20" rx="5" fill="#FFFFFF" opacity="1.0" stroke="#1470C4" stroke-width="1"/><text x="459.5" y="327.0" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#1470C4" font-weight="800" text-anchor="middle" opacity="1.0">出处</text><text x="96" y="462" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">关系只存一次（有向）；反向（谁「要求」我）靠遍历，不另存。</text><text x="800" y="232" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">五种边（关系）· 一句话看懂</text><rect x="800" y="250" width="16" height="16" rx="4" fill="#0E9C9C" opacity="1.0"/><text x="826" y="263" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#0E9C9C" font-weight="800" text-anchor="start" opacity="1.0">要求</text><text x="860.52" y="263" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5A6B7B" font-weight="700" text-anchor="start" opacity="1.0">requires</text><text x="826" y="281" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">申报类型 → 该遵守的法规（IND 要 GCP）</text><rect x="800" y="289" width="16" height="16" rx="4" fill="#2E9E6B" opacity="1.0"/><text x="826" y="302" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#2E9E6B" font-weight="800" text-anchor="start" opacity="1.0">归类</text><text x="860.52" y="302" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5A6B7B" font-weight="700" text-anchor="start" opacity="1.0">belongs_to</text><text x="826" y="320" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">法规 → 所属主题分类（GCP 属 细胞治疗）</text><rect x="800" y="328" width="16" height="16" rx="4" fill="#E0812E" opacity="1.0"/><text x="826" y="341" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#E0812E" font-weight="800" text-anchor="start" opacity="1.0">替代</text><text x="860.52" y="341" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5A6B7B" font-weight="700" text-anchor="start" opacity="1.0">supersedes</text><text x="826" y="359" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">新版法规 → 被它取代的旧版</text><rect x="800" y="367" width="16" height="16" rx="4" fill="#7A5CC0" opacity="1.0"/><text x="826" y="380" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#7A5CC0" font-weight="800" text-anchor="start" opacity="1.0">引用</text><text x="860.52" y="380" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5A6B7B" font-weight="700" text-anchor="start" opacity="1.0">references</text><text x="826" y="398" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">一条法规文本里提到 / 引用另一条</text><rect x="800" y="406" width="16" height="16" rx="4" fill="#1470C4" opacity="1.0"/><text x="826" y="419" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13" fill="#1470C4" font-weight="800" text-anchor="start" opacity="1.0">出处</text><text x="860.52" y="419" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#5A6B7B" font-weight="700" text-anchor="start" opacity="1.0">evidence</text><text x="826" y="437" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="11" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">概念 ↔ 它的原文块（双向：取原文 / 抬升）</text><text x="800" y="458" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="10.5" fill="#93A1B3" font-weight="700" text-anchor="start" opacity="1.0">物理上 = 一张边表（源 ｜ 类型 ｜ 目标 ｜ 权重），每条关系存一行。</text><g filter="url(#sh)"><rect x="70" y="486" width="567" height="180" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="70" y="486" width="6" height="180" rx="3" fill="#E0812E" opacity="1.0"/><circle cx="114" cy= </text><g filter="url(#sh)"><rect x="643" y="486" width="567" height="180" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="643" y="486" width="6" height="180" rx="3" fill="#0E9C9C" opacity="1.0"/><circle cx="687" cy="516" r="18" fill="#D3EFEE" opacity="1.0"/><circle cx="685.05" cy="514.05" r="6.76" fill="none" opacity="1.0" stroke="#0E9C9C" stroke-width="3"/><line x1="689.86" y1="518.86" x2="695.06" y2="524.06" stroke="#0E9C9C" stroke-width="3.4" opacity="1.0" stroke-linecap="round"/><text x="717" y="522" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="16" fill="#17222E" font-weight="800" text-anchor="start" opacity="1.0">怎么检索</text><circle cx="675" cy="546" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="550" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">从起点实体沿某类型边遍历 / 带权扩散（Traverse），可多跳。</text><circle cx="675" cy="572" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="576" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">反向查 = 换方向遍历（谁「要求」我）。</text><circle cx="675" cy="598" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="602" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">块 ↔ 实体：走「出处」边（Lift 抬升 / Ground 取原文）。</text><circle cx="675" cy="624" r="3" fill="#0E9C9C" opacity="1.0"/><text x="689" y="628" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">多跳 = 沿边接力；带权累乘用于剪枝与排序。</text></svg></body></html>

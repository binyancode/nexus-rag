ight="800" text-anchor="middle" opacity="1.0">图找全找准</text><text x="505.0" y="306" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#5A6B7B" font-weight="600" text-anchor="middle" opacity="1.0">沿关系精确聚合</text><line x1="634" y1="255" x2="666" y2="255" stroke="#5A6B7B" stroke-width="2.6" marker-end="url(#arrow)" stroke-linecap="round"/><g filter="url(#sh)"><rect x="670" y="190" width="250" height="130" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="670" y="190" width="6" height="130" rx="3" fill="#7A5CC0" opacity="1.0"/><circle cx="795.0" cy="232" r="30" fill="#E7E0F6" opacity="1.0"/><circle cx="795.0" cy="222.1" r="3.96" fill="#7A5CC0" opacity="1.0"/><circle cx="785.1" cy="240.8" r="3.96" fill="#7A5CC0" opacity="1.0"/><circle cx="804.9" cy="240.8" r="3.96" fill="#7A5CC0" opacity="1.0"/><line x1="792.8" y1="225.4" x2="786.64" y2="237.5" stroke="#7A5CC0" stroke-width="2.4" opacity="1.0" stroke-linecap="round"/><line x1="797.2" y1="225.4" x2="803.36" y2="237.5" stroke="#7A5CC0" stroke-width="2.4" opacity="1.0" stroke-linecap="round"/><text x="795.0" y="284" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="16.5" fill="#17222E" font-weight="800" text-anchor="middle" opacity="1.0">SQG 可见</text><text x="795.0" y="306" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="12.5" fill="#5A6B7B" font-weight="600" text-anchor="middle" opacity="1.0">每步可排查</text><line x1="924" y1="255" x2="956" y2="255" stroke="#5A6B7B" stroke-width="2.6" marker-end="url(#arrow)" stroke-linecap="round"/><g filter="url(#sh)"><rect x="960" y="190" width="250" height="130" rx="14" fill="#FFFFFF" opacity="1.0"/></g><rect x="960" y="190" width="6" height="130" rx="3" fill="#2E9E6B" opacity="1.0"/><circle cx="1085.0" cy="232" r="30" fill="#D7F0E3" opacity="1.0"/><rect x="1076.2" y="219.9" width="17.6" height="24.200000000000003" rx="4" fill="#2E9E6B" opacity="1.0"/><line x1="1080.6" y1="226.5" x2= rif" font-size="13.5" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">我们用两层图 + 大模型编译的算子 DAG + 优化器/执行器，把“</text><text x="686" y="440" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#5A6B7B" font-weight="600" text-anchor="start" opacity="1.0">怎么查”显式化、可视化，贴合文档天然层级。</text><rect x="70" y="520" width="1140" height="54" rx="12" fill="#0E2E52" opacity="1.0"/><rect x="70" y="520" width="6" height="54" rx="3" fill="#E0812E" opacity="1.0"/><text x="92" y="552" font-family="'Microsoft YaHei','Segoe UI','Segoe UI Emoji',sans-serif" font-size="13.5" fill="#DCEBFA" font-weight="700" text-anchor="start" opacity="1.0">落地节奏：先小本体 + 固定算子子集跑通 → 再逐步加优化器与算子；评估看 计划正确率 / 覆盖率 / 漂移率 / 溯源率。</text></svg></body></html>
